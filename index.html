<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Root Cause | Identify. Propose. Drive.</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="The Root Cause is a civic-tech social platform where citizens identify failures, propose reforms, and drive action for a better India.">
    <meta name="keywords" content="civic tech, social platform, reforms, public issues, India, governance, activism, The Root Cause">
    <meta name="author" content="The Root Cause Team">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://therootcause.in/">
    <meta property="og:title" content="The Root Cause | Civic-Tech Revolution">
    <meta property="og:description" content="Identify failures, propose reforms, and drive action. Join the movement for a better India.">
    <meta property="og:image" content="https://therootcause.in/og-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://therootcause.in/">
    <meta property="twitter:title" content="The Root Cause | Civic-Tech Revolution">
    <meta property="twitter:description" content="Identify failures, propose reforms, and drive action. Join the movement for a better India.">
    <meta property="twitter:image" content="https://therootcause.in/og-image.jpg">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://therootcause.in/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { brand: '#f97316', darkBg: '#0f172a', darkCard: '#1e293b' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen">

    <div id="onboarding-view" class="flex items-center justify-center min-h-screen p-4">
        <!-- Login Step -->
        <div id="step-login" class="max-w-md w-full glass p-8 rounded-3xl orange-glow animate-slide-up">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-brand rounded-2xl mb-4">
                    <i data-lucide="root" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-bold mb-2">The Root Cause</h1>
                <p class="text-slate-500 dark:text-slate-400">Identify Failures. Propose Reforms. Drive Action.</p>
            </div>
            <div class="space-y-4">
                <button id="google-login-btn" onclick="handleGoogleLogin()" class="w-full flex items-center justify-center gap-3 bg-white text-slate-900 font-semibold py-3 px-4 rounded-xl hover:bg-slate-100 transition-all border border-slate-200 relative overflow-hidden group">
                    <span id="login-text" class="flex items-center gap-3">
                        <i data-lucide="chrome" class="w-5 h-5 text-red-500"></i> Continue with Google
                    </span>
                    <div id="login-loader" class="hidden animate-spin">
                        <i data-lucide="loader-2" class="w-5 h-5 text-brand"></i>
                    </div>
                </button>
                <button onclick="skipDemo()" class="w-full text-slate-500 dark:text-slate-400 hover:text-brand transition-colors font-medium py-2">
                    Skip Demo
                </button>
            </div>
        </div>

        <!-- Profile Setup Step -->
        <div id="step-profile" class="hidden max-w-md w-full glass p-8 rounded-3xl animate-slide-up">
            <h2 class="text-2xl font-bold mb-6">Create your identity</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1 opacity-70">Username</label>
                    <input type="text" id="input-username" placeholder="@citizen_x" class="w-full bg-slate-200 dark:bg-slate-800 border-none rounded-xl p-3 focus:ring-2 focus:ring-brand outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 opacity-70">Display Name</label>
                    <input type="text" id="input-displayname" placeholder="John Doe" class="w-full bg-slate-200 dark:bg-slate-800 border-none rounded-xl p-3 focus:ring-2 focus:ring-brand outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 opacity-70">State / UT</label>
                        <select id="input-state" class="w-full bg-slate-100 dark:bg-slate-800 border border-transparent focus:border-brand rounded-xl p-3 focus:ring-2 focus:ring-brand/20 outline-none cursor-pointer text-slate-900 dark:text-white transition-all duration-300">
                            <option value="" disabled selected>Select State</option>
                            <option>Andhra Pradesh</option>
                            <option>Arunachal Pradesh</option>
                            <option>Assam</option>
                            <option>Bihar</option>
                            <option>Chhattisgarh</option>
                            <option>Goa</option>
                            <option>Gujarat</option>
                            <option>Haryana</option>
                            <option>Himachal Pradesh</option>
                            <option>Jharkhand</option>
                            <option>Karnataka</option>
                            <option>Kerala</option>
                            <option>Madhya Pradesh</option>
                            <option>Maharashtra</option>
                            <option>Manipur</option>
                            <option>Meghalaya</option>
                            <option>Mizoram</option>
                            <option>Nagaland</option>
                            <option>Odisha</option>
                            <option>Punjab</option>
                            <option>Rajasthan</option>
                            <option>Sikkim</option>
                            <option>Tamil Nadu</option>
                            <option>Telangana</option>
                            <option>Tripura</option>
                            <option>Uttar Pradesh</option>
                            <option>Uttarakhand</option>
                            <option>West Bengal</option>
                            <option disabled>--- Union Territories ---</option>
                            <option>Andaman and Nicobar Islands</option>
                            <option>Chandigarh</option>
                            <option>Dadra and Nagar Haveli and Daman and Diu</option>
                            <option>Lakshadweep</option>
                            <option>Delhi</option>
                            <option>Puducherry</option>
                            <option>Ladakh</option>
                            <option>Jammu and Kashmir</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 opacity-70">City</label>
                        <input type="text" id="input-city" list="cities-list" placeholder="Search City..." class="w-full bg-slate-100 dark:bg-slate-800 border border-transparent focus:border-brand rounded-xl p-3 focus:ring-2 focus:ring-brand/20 outline-none text-slate-900 dark:text-white transition-all duration-300">
                        <datalist id="cities-list"></datalist>
                    </div>
                </div>
                <button onclick="nextStep('step-persona')" class="w-full bg-brand hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-xl transition-colors mt-4">
                    Next: Choose Persona
                </button>
            </div>
        </div>

        <!-- Persona Step -->
        <div id="step-persona" class="hidden max-w-2xl w-full glass p-8 rounded-3xl animate-slide-up">
            <h2 class="text-2xl font-bold mb-2 text-center">Choose your Persona</h2>
            <p class="text-slate-500 dark:text-slate-400 text-center mb-8">How will you contribute to the movement?</p>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <div onclick="selectPersona('Critic')" class="persona-card cursor-pointer p-4 rounded-2xl border-2 border-transparent hover:border-red-500 bg-red-500/10 text-center transition-all">
                    <i data-lucide="zap" class="w-8 h-8 mx-auto mb-2 text-red-500"></i>
                    <h3 class="font-bold text-red-500">Critic</h3>
                </div>
                <div onclick="selectPersona('Thinker')" class="persona-card cursor-pointer p-4 rounded-2xl border-2 border-transparent hover:border-blue-500 bg-blue-500/10 text-center transition-all">
                    <i data-lucide="brain" class="w-8 h-8 mx-auto mb-2 text-blue-500"></i>
                    <h3 class="font-bold text-blue-500">Thinker</h3>
                </div>
                <div onclick="selectPersona('Jester')" class="persona-card cursor-pointer p-4 rounded-2xl border-2 border-transparent hover:border-yellow-500 bg-yellow-500/10 text-center transition-all">
                    <i data-lucide="laugh" class="w-8 h-8 mx-auto mb-2 text-yellow-500"></i>
                    <h3 class="font-bold text-yellow-500">Jester</h3>
                </div>
                <div onclick="selectPersona('Executor')" class="persona-card cursor-pointer p-4 rounded-2xl border-2 border-transparent hover:border-green-500 bg-green-500/10 text-center transition-all">
                    <i data-lucide="hammer" class="w-8 h-8 mx-auto mb-2 text-green-500"></i>
                    <h3 class="font-bold text-green-500">Executor</h3>
                </div>
                <div onclick="selectPersona('Verifier')" class="persona-card cursor-pointer p-4 rounded-2xl border-2 border-transparent hover:border-purple-500 bg-purple-500/10 text-center transition-all">
                    <i data-lucide="shield-check" class="w-8 h-8 mx-auto mb-2 text-purple-500"></i>
                    <h3 class="font-bold text-purple-500">Verifier</h3>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const handleGoogleLogin = () => {
            const btn = document.getElementById('google-login-btn');
            const text = document.getElementById('login-text');
            const loader = document.getElementById('login-loader');
            
            // Simulation
            btn.disabled = true;
            text.classList.add('hidden');
            loader.classList.remove('hidden');
            
            setTimeout(() => {
                // Mock user data from Google
                const googleUser = {
                    username: 'google_citizen',
                    displayName: 'Google Explorer',
                    state: 'Delhi',
                    city: 'New Delhi',
                    persona: 'Thinker',
                    points: 500,
                    posts: 2,
                    upvotes: 120,
                    joinDate: 'May 2026',
                    avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=GoogleUser'
                };
                localStorage.setItem('trc_user', JSON.stringify(googleUser));
                
                // Transition to profile setup with pre-filled data or skip to persona
                nextStep('step-profile');
                
                // Pre-fill profile fields
                document.getElementById('input-username').value = googleUser.username;
                document.getElementById('input-displayname').value = googleUser.displayName;
                
                // Re-enable for next time if needed
                btn.disabled = false;
                text.classList.remove('hidden');
                loader.classList.add('hidden');
                lucide.createIcons();
            }, 1500);
        };

        const nextStep = (stepId) => {
            document.querySelectorAll('#onboarding-view > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(stepId).classList.remove('hidden');
        };

        const skipDemo = () => {
            window.location.href = 'dashboard.html';
        };

        const selectPersona = (p) => {
            const user = {
                username: document.getElementById('input-username').value || 'citizen_x',
                displayName: document.getElementById('input-displayname').value || 'New Citizen',
                state: document.getElementById('input-state').value,
                city: document.getElementById('input-city').value || 'Mumbai',
                persona: p,
                points: 0,
                posts: 0,
                upvotes: 0,
                joinDate: 'May 2026',
                avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${Math.random()}`
            };
            localStorage.setItem('trc_user', JSON.stringify(user));
            window.location.href = 'dashboard.html';
        };

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            applyTheme();

            // Dynamic City Search Logic
            const cityInput = document.getElementById('input-city');
            const citiesDatalist = document.getElementById('cities-list');

            cityInput.addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase();
                citiesDatalist.innerHTML = ''; // Clear current options

                if (val.length > 0) {
                    // Filter and Sort cities
                    const matches = indianCities
                        .filter(city => city.toLowerCase().startsWith(val))
                        .sort((a, b) => a.localeCompare(b));

                    // Populate datalist
                    matches.forEach(city => {
                        const option = document.createElement('option');
                        option.value = city;
                        citiesDatalist.appendChild(option);
                    });
                }
            });
        });
    </script>
</body>
</html>
