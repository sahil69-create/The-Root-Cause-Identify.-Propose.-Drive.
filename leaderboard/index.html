<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | The Root Cause</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="See who is leading the movement. Top impact makers in The Root Cause community.">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://therootcause.in/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: '#f97316', darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="app" class="relative min-h-screen flex flex-col"></div>

    <script src="../js/app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            initPage('leaderboard');
            renderLeaderboard();
        });

        const renderLeaderboard = () => {
            const container = document.getElementById('page-content');
            container.innerHTML = `
                <div class="mb-8">
                    <h2 class="text-3xl font-bold mb-2">Leaderboard</h2>
                    <p class="text-slate-400">Top impact makers driving change this month.</p>
                </div>
                <div class="space-y-3">
                    ${state.users.sort((a,b) => b.points - a.points).map((user, idx) => `
                        <div class="glass p-4 rounded-2xl flex items-center gap-4 hover:scale-[1.01] transition-all">
                            <div class="w-8 font-black text-2xl ${idx < 3 ? 'text-brand' : 'text-slate-600'}">#${idx + 1}</div>
                            <img src="${user.avatar}" class="w-12 h-12 rounded-full">
                            <div class="flex-1"><div class="font-bold">${user.name}</div><div class="text-xs text-slate-500">@${user.username} • ${user.persona}</div></div>
                            <div class="text-right"><div class="font-bold text-brand">${user.points.toLocaleString()}</div><div class="text-[10px] uppercase font-bold text-slate-500">Impact Points</div></div>
                        </div>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        };
    </script>
</body>
</html>
