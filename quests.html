<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Quests | The Root Cause</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="Complete civic quests, earn impact points, and drive real-world change.">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://therootcause.in/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: '#f97316', darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="app" class="relative min-h-screen flex flex-col"></div>

    <script src="js/app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            initPage('quests');
            renderQuests();
        });

        const renderQuests = () => {
            const container = document.getElementById('page-content');
            container.innerHTML = `
                <div class="mb-8">
                    <h2 class="text-3xl font-bold mb-2">Civic Quests</h2>
                    <p class="text-slate-400">Complete tasks to earn Impact Points and unlock achievements.</p>
                </div>
                <div class="space-y-4">
                    ${state.quests.map(quest => `
                        <div class="glass p-6 rounded-3xl">
                            <div class="flex items-center justify-between mb-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 rounded-2xl bg-brand/10 flex items-center justify-center"><i data-lucide="sword" class="text-brand w-6 h-6"></i></div>
                                    <div><h3 class="font-bold text-lg">${quest.title}</h3><p class="text-xs text-slate-500">${quest.desc}</p></div>
                                </div>
                                <div class="text-right"><div class="text-brand font-bold">+${quest.reward} XP</div><div class="text-[10px] font-bold uppercase tracking-wider ${quest.status === 'Completed' ? 'text-green-500' : 'text-slate-400'}">${quest.status}</div></div>
                            </div>
                            <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden"><div class="bg-brand h-full transition-all duration-1000" style="width: ${quest.progress}%"></div></div>
                            <div class="mt-4 flex justify-end"><button class="text-sm font-bold text-brand hover:underline" onclick="showToast('Quest details...')">${quest.status === 'Completed' ? 'Claim Rewards' : 'Continue Quest'}</button></div>
                        </div>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        };
    </script>
</body>
</html>
